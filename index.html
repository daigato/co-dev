<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteKeeper（仮）</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    >
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">MAP WEB APP</p>
        <h1>RouteKeeper（仮）</h1>
      </div>

      <div class="primary-actions" aria-label="主な操作">
        <button id="sidebar-toggle-button" type="button" class="btn-toggle">サイドバー切替</button>
        <button id="current-location-button" type="button">現在地を表示</button>
      </div>
    </header>

    <main class="app-layout">
      <aside class="sidebar" aria-label="スポット情報">
        <section class="panel" aria-labelledby="registration-heading">
          <h2 id="registration-heading">スポット登録</h2>

          <label for="spot-name">スポット名</label>
          <input
            id="spot-name"
            name="spot-name"
            type="text"
            autocomplete="off"
            placeholder="例：○○公園"
          >

          <label for="spot-type" style="margin-top: 1rem;">タイプ</label>
          <select
            id="spot-type"
            name="spot-type"
          >
            <option value="entry">入口 (Entry)</option>
            <option value="way">経由地 (Way)</option>
            <option value="exit">出口 (Exit)</option>
          </select>

          <div
            id="registration-actions"
            class="registration-actions"
            aria-label="登録操作"
          >
            <button id="spot-save-button" type="button" class="btn-primary" disabled>保存</button>
            <button id="spot-cancel-button" type="button" class="btn-secondary">クリア</button>
          </div>
        </section>

        <section class="panel saved-spots-panel" aria-labelledby="saved-spots-heading">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
            <h2 id="saved-spots-heading" style="margin: 0;">保存済みスポット</h2>
            <button id="clear-all-spots-button" type="button" class="btn-secondary" style="font-size: 0.75rem; padding: 2px 8px; min-height: auto;">全クリア</button>
          </div>
          <div id="saved-spots-list">
            <p class="placeholder-text">一覧表示は未実装です。</p>
          </div>
        </section>

        <section class="panel settings-panel" aria-labelledby="settings-heading">
          <h2 id="settings-heading">設定</h2>
          <label for="api-key">OpenRouteService APIキー</label>
          <input
            id="api-key"
            name="api-key"
            type="password"
            placeholder="APIキーを入力..."
          >
          <p class="placeholder-text" style="font-size: 0.75rem; margin-top: 0.4rem; line-height: 1.4;">
            徒歩ルート検索に使用します。キーはブラウザに安全に保存されます。
          </p>
        </section>
      </aside>

      <section class="map-column" aria-label="地図とルート情報">
        <div id="route-info" class="route-info" aria-live="polite">
          <span>距離：<strong id="route-distance">--</strong></span>
          <span>所要時間：<strong id="route-duration">--</strong></span>
        </div>

        <div id="map" aria-label="地図表示領域">
          <p>地図表示は未実装です。</p>
        </div>
      </section>
    </main>

    <div id="status-message" class="status-message" role="status" aria-live="polite">
      共通の開発土台を読み込みました。各機能はまだ未実装です。
    </div>

    <!-- 読み込み順：Leaflet → 設定例 → 共通状態 → 各担当 → 初期化 -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="js/config.example.js"></script>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/map.js"></script>
    <script src="js/routing.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/spots.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
